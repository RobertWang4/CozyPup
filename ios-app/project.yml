name: CozyPup
options:
  bundleIdPrefix: com.cozypup
  deploymentTarget:
    iOS: "17.0"
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 9.1.0
targets:
  CozyPup:
    type: application
    platform: iOS
    sources: [CozyPup]
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robertwang.cozypup.dev
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: SP9KQ7NFJN
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSCameraUsageDescription: "CozyPup needs camera access to take photos of your pet"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "CozyPup needs microphone access for voice input"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "CozyPup needs photo library access to attach pet photos"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "CozyPup uses speech recognition for voice input"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "CozyPup uses your location to find nearby pet services"
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIRequiresFullScreen: true
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
