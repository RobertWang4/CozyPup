name: CozyPup
options:
  bundleIdPrefix: com.cozypup
  deploymentTarget:
    iOS: "17.0"
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 9.1.0
targets:
  CozyPup:
    type: application
    platform: iOS
    sources: [CozyPup]
    info:
      path: CozyPup/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - com.googleusercontent.apps.601329501885-ru8qjq46n4ri34eenkd4g1qkcqho1fm2
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UIStatusBarStyle: UIStatusBarStyleDefault
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "CozyPup needs camera access to take photos of your pet"
        NSMicrophoneUsageDescription: "CozyPup needs microphone access for voice input"
        NSPhotoLibraryUsageDescription: "CozyPup needs photo library access to attach pet photos"
        NSSpeechRecognitionUsageDescription: "CozyPup uses speech recognition for voice input"
        NSLocationWhenInUseUsageDescription: "CozyPup uses your location to find nearby pet services"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robertwang.cozypup.dev
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: SP9KQ7NFJN
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
